name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # test — compile + unit tests only (no network, no DB)
  #
  # Integration tests (data_source_verification, daemon_lifecycle, etc.) are
  # intentionally excluded here — they hit live external APIs (USGS, CWMS, IEM)
  # and require a running PostgreSQL instance. Run those manually before major
  # releases: cargo test --test data_source_verification
  # ---------------------------------------------------------------------------
  test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flomon_service

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: flomon_service

      - name: cargo check (all targets)
        run: cargo check --all-targets

      - name: cargo test --lib (unit tests only)
        run: cargo test --lib

  # ---------------------------------------------------------------------------
  # deploy — SSH into GCE, pull latest, rebuild image, restart containers
  #
  # Only runs on push to main after test passes.
  #
  # Required repository secrets:
  #   GCE_HOST     — external IP address of the GCE VM
  #   GCE_USER     — SSH username (e.g. your GCP account username)
  #   GCE_SSH_KEY  — private SSH key (contents of ~/.ssh/id_ed25519 or similar)
  #                  The corresponding public key must be in the VM's
  #                  ~/.ssh/authorized_keys or GCP OS Login.
  #
  # Note: first deploy after provisioning takes ~10 min (Rust compile + backfill).
  # Subsequent deploys are faster — cargo caches layers in the Docker build cache.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to GCE
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -e
            cd ~/riverviews
            git pull origin main

            # Rebuild flomon_service image and restart — postgres is untouched
            # unless its config changed. The pgdata volume is never removed here.
            docker compose up --build -d postgres flomon_service

            echo "Containers restarted. Waiting for HTTP API..."
            # Health check — the API comes up after backfill on first run,
            # or within ~5s on subsequent restarts when DB is already populated.
            for i in $(seq 1 36); do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "Service is healthy."
                exit 0
              fi
              sleep 10
            done
            echo "Health check timed out (6 min). Service may still be backfilling on first run — check: docker compose logs flomon_service"
            exit 1
